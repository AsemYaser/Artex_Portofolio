<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Virtual Tour — Artex Designs</title>
    <meta name="description" content="Experience our luxury interior designs in an immersive 360° virtual tour. Explore every detail of our crafted spaces.">

    <!-- Favicons -->
    <link rel="icon" href="images/favicon.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <!-- SEO / Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Artex Designs",
      "url": "https://artexinterior.com/",
      "logo": "https://artexinterior.com/images/logo.png"
    }
    </script>

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://artexinterior.com/standalone-tour.html">
    <meta property="og:title" content="360° Virtual Tour — Artex Designs">
    <meta property="og:description" content="Experience our luxury interior designs in an immersive 360° virtual tour.">
    <meta property="og:image" content="images/hero2.jpg">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Pannellum 360° Viewer CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        /* Global Reset for Standalone Tour */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* Override the original container constraints for true fullscreen */
        .tour-360-container {
            width: 100% !important;
            height: 100% !important;
            aspect-ratio: auto !important;
            border-radius: 0 !important;
            border: none !important;
            box-shadow: none !important;
        }

        .tour-360-wrapper {
            margin: 0 !important;
            width: 100%;
            height: 100%;
        }

        .tour-fade {
            position: absolute;
            inset: 0;
            z-index: 50;
            background: #000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .tour-fade.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="tour-360-wrapper">
        <div class="tour-360-container" id="tour360Viewer"></div>
        <div class="tour-fade" id="tour360Fade"></div>
    </div>

    <script>
        // Extract project scenes config
        const allProjects = {
          'virtual-tour-360': {

            'view1': {
                image: 'Artex_360/opt_11.jpg',
                label: 'View 1 — Living Area',
                defaultPitch: 0,
                defaultYaw: 0,
                hotspots: [
                    { pitch: -2.05, yaw: 4.40, targetScene: 'view3', label: 'Go to View 3' },
                    { pitch: 0.03, yaw: 40.40, targetScene: 'view2', label: 'Go to View 2' }
                ]
            },
            'view2': {
                image: 'Artex_360/opt_12.jpg',
                label: 'View 2 — Dining Area',
                defaultPitch: 0,
                defaultYaw: 0,
                hotspots: [
                    { pitch: -1.22, yaw: -157.24, targetScene: 'view3', label: 'Go to View 3' },
                    { pitch: -8.42, yaw: 158.88, targetScene: 'view1', label: 'Go to View 1' }
                ]
            },
            'view3': {
                image: 'Artex_360/opt_13.jpg',
                label: 'View 3 — Bedroom',
                defaultPitch: 0,
                defaultYaw: 0,
                hotspots: [
                    { pitch: 1.63, yaw: -34.31, targetScene: 'view2', label: 'Go to View 2' }
                ]
            }
          },
          'abdo-hamam-360': {
            'reception': {
              image: 'Abdo_Hamam_360/reception & dining.jpg',
              label: 'Reception & Dining',
              defaultPitch: 0,
              defaultYaw: 0,
              hotspots: [
                { pitch: 1.22, yaw: 73.73, targetScene: 'kitchen', label: 'Go to Kitchen' },
                { pitch: 1.46, yaw: 118.72, targetScene: 'living', label: 'Go to Living Area' }
              ]
            },
            'living': {
              image: 'Abdo_Hamam_360/living.jpg',
              label: 'Living Area',
              defaultPitch: 0,
              defaultYaw: 0,
              hotspots: [
                { pitch: -1.86, yaw: -170, targetScene: 'reception', label: 'Back to Reception & Dining' },
                { pitch: -9, yaw: -15, targetScene: 'masterbed', label: 'Go to Master Bedroom' },
                { pitch: -11, yaw: -39, targetScene: 'kids1', label: 'Go to Kids Room 1' },
                { pitch: -18, yaw: -83, targetScene: 'kids2', label: 'Go to Kids Room 2' },
                { pitch: -8, yaw: -152, targetScene: 'mainbath', label: 'Go to Main Bathroom' },
                { pitch: -7, yaw: 29, targetScene: 'laundry', label: 'Go to Laundry' }
              ]
            },
            'kitchen': {
              image: 'Abdo_Hamam_360/kitchen.jpg',
              label: 'Kitchen',
              defaultPitch: 0,
              defaultYaw: 0,
              hotspots: [
                { pitch: -1.30, yaw: -178.81, targetScene: 'reception', label: 'Back to Reception & Dining' }
              ]
            },
            'masterbed': {
              image: 'Abdo_Hamam_360/master bedroom.jpg',
              label: 'Master Bedroom',
              defaultPitch: 0,
              defaultYaw: 0,
              hotspots: [
                { pitch: -6, yaw: 34, targetScene: 'masterbath', label: 'Go to Master Bathroom' },
                { pitch: -2, yaw: 26, targetScene: 'masterdressing', label: 'Go to Master Dressing' },
                { pitch: -11, yaw: 123, targetScene: 'living', label: 'Go to Living Area' }
              ]
            },
            'masterdressing': {
              image: 'Abdo_Hamam_360/master bedroom dressing.jpg',
              label: 'Master Dressing',
              defaultPitch: 0,
              defaultYaw: 0,
              hotspots: [
                { pitch: -15, yaw: -153, targetScene: 'masterbath', label: 'Go to Master Bathroom' },
                { pitch: -6, yaw: -115, targetScene: 'masterbed', label: 'Back to Master Bedroom' }
              ]
            },
            'masterbath': {
              image: 'Abdo_Hamam_360/master bathroom.jpg',
              label: 'Master Bathroom',
              defaultPitch: 0,
              defaultYaw: 0,
              hotspots: [
                { pitch: -22, yaw: -168, targetScene: 'masterdressing', label: 'Back to Master Dressing' }
              ]
            },
            'kids1': {
              image: 'Abdo_Hamam_360/kids 1.jpg',
              label: 'Kids Room 1',
              defaultPitch: 0,
              defaultYaw: 0,
              hotspots: [
                { pitch: -13, yaw: 160, targetScene: 'living', label: 'Back to Living Area' }
              ]
            },
            'kids2': {
              image: 'Abdo_Hamam_360/kids 2.jpeg',
              label: 'Kids Room 2',
              defaultPitch: 0,
              defaultYaw: 0,
              hotspots: [
                { pitch: -3, yaw: 128, targetScene: 'living', label: 'Back to Living Area' }
              ]
            },
            'mainbath': {
              image: 'Abdo_Hamam_360/main bathroom.jpg',
              label: 'Main Bathroom',
              defaultPitch: 0,
              defaultYaw: 0,
              hotspots: [
                { pitch: -14, yaw: -87, targetScene: 'living', label: 'Back to Living Area' }
              ]
            },
            'laundry': {
              image: 'Abdo_Hamam_360/laundry.jpeg',
              label: 'Laundry',
              defaultPitch: 0,
              defaultYaw: 0,
              hotspots: [
                { pitch: -5, yaw: 1, targetScene: 'living', label: 'Back to Living Area' }
              ]
            }
          }
        };

        const projectId = new URLSearchParams(window.location.search).get('project') || 'virtual-tour-360';
        const projectScenes = allProjects[projectId] || allProjects['virtual-tour-360'];

        const sceneIds = Object.keys(projectScenes);
        const firstScene = sceneIds[0];

        let currentSceneId = firstScene;
        const pannellumScenes = {};
        const fadeEl = document.getElementById('tour360Fade');

        function navigateToScene(targetSceneId) {
            if (targetSceneId === currentSceneId) return;
            if (fadeEl) fadeEl.classList.add('active');
            
            setTimeout(() => {
                viewer.loadScene(targetSceneId);
                currentSceneId = targetSceneId;
                setTimeout(() => {
                    if (fadeEl) fadeEl.classList.remove('active');
                }, 300);
            }, 400);
        }

        sceneIds.forEach(sceneId => {
            const scene = projectScenes[sceneId];
            const pnlmHotspots = scene.hotspots.map((hs, idx) => ({
                id: `hotspot-${sceneId}-${idx}`,
                pitch: hs.pitch,
                yaw: hs.yaw,
                type: 'custom',
                cssClass: 'tour-hotspot pnlm-tooltip pnlm-info',
                createTooltipFunc: (hotSpotDiv) => {
                    hotSpotDiv.innerHTML = `
                      <div class="hotspot-inner">
                        <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                      </div>
                      <div class="hotspot-pulse"></div>
                      <div class="hotspot-label">${hs.label}</div>
                    `;
                    // Ensure the click event takes precedence
                    hotSpotDiv.addEventListener('pointerup', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        navigateToScene(hs.targetScene);
                    });
                    hotSpotDiv.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        navigateToScene(hs.targetScene);
                    });
                },
                createTooltipArgs: ''
            }));

            pannellumScenes[sceneId] = {
                type: 'equirectangular',
                panorama: scene.image,
                pitch: scene.defaultPitch || 0,
                yaw: scene.defaultYaw || 0,
                hfov: 110,
                autoLoad: true,
                showControls: true,
                hotSpots: pnlmHotspots
            };
        });

        const viewer = pannellum.viewer('tour360Viewer', {
            default: {
                firstScene: firstScene,
                autoLoad: true,
                showZoomCtrl: true,
                showFullscreenCtrl: true,
                compass: false,
                mouseZoom: true,
                draggable: true,
                friction: 0.15,
                minHfov: 50,
                maxHfov: 120,
                autoRotate: -1.5,
                autoRotateInactivityDelay: 5000,
                sceneFadeDuration: 1200
            },
            scenes: pannellumScenes
        });

        // MOBILE FIX: Ensure the fullscreen icon is always visible for premium consistency
        viewer.on('load', () => {
            const container = document.querySelector('.pnlm-controls-container');
            const fsBtn = document.querySelector('.pnlm-fullscreen-toggle-button');
            if (container && (!fsBtn || window.getComputedStyle(fsBtn).display === 'none')) {
                if (fsBtn) fsBtn.remove();
                const customFsBtn = document.createElement('div');
                customFsBtn.className = 'pnlm-fullscreen-toggle-button pnlm-sprite pnlm-controls pnlm-control';
                customFsBtn.addEventListener('click', () => {
                    const el = document.documentElement;
                    if (el.requestFullscreen) el.requestFullscreen();
                    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                    else if (el.msRequestFullscreen) el.msRequestFullscreen();
                });
                container.appendChild(customFsBtn);
            }
        });
    </script>
</body>
</html>
